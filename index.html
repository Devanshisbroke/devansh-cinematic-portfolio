<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Devansh Barai — Builder & Founder</title>
    <meta name="description" content="Personal portfolio of Devansh Barai — IIT Madras & IIM Bangalore student, startup founder, and product builder." />
    <meta property="og:title" content="Devansh Barai — Builder & Founder" />
    <meta property="og:description" content="Building ideas into reality. Student at IIT Madras & IIM Bangalore. Founder of Globe ID, Khetech & Last Minute Notes." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply saved theme before first paint — prevents flash
      (function() {
        var t = localStorage.getItem('portfolio-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <style>
      /* Prevent FOUC */
      html { background: #04050f; }
      [data-theme="light"] { background: #f8fafc; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
